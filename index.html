<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RapidResolve AI - Test UI</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }
        h1 { color: #1a365d; }
        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #1d4ed8; }
        button:disabled { background-color: #93c5fd; cursor: not-allowed; }
        
        #loading {
            display: none;
            text-align: center;
            font-weight: bold;
            color: #2563eb;
            margin: 20px 0;
        }
        
        #results-section { display: none; }
        
        .candidate-card {
            border-left: 4px solid #2563eb;
            background: #f8fafc;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 0 4px 4px 0;
        }
        .score-badge {
            background: #1e40af;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 14px;
        }
        .error { color: #dc2626; font-weight: bold; }
    </style>
</head>
<body>

    <h1>RapidResolve AI Tester</h1>
    
    <div class="card" id="input-section">
        <h3>Submit Crisis Job Description</h3>
        <textarea id="jd-input" placeholder="Paste your urgent job description or crisis scenario here..."></textarea>
        <button id="submit-btn" onclick="evaluateCrisis()">Analyze & Rank Candidates</button>
    </div>

    <div id="loading">
        <p>🤖 AI Agents are analyzing criteria and scoring candidates... please wait.</p>
    </div>

    <div id="results-section">
        <div class="card">
            <h3>1. JD Agent Analysis</h3>
            <p><strong>Extracted Criteria:</strong> <span id="out-criteria"></span></p>
            <p><strong>Urgency Score:</strong> <span id="out-urgency"></span>/10</p>
        </div>

        <div class="card">
            <h3>2. Ranked Candidates</h3>
            <div id="candidate-list"></div>
        </div>
        
        <button onclick="resetTest()">Test Another JD</button>
    </div>

    <script>
        async function evaluateCrisis() {
            const jdText = document.getElementById('jd-input').value;
            const btn = document.getElementById('submit-btn');
            const loading = document.getElementById('loading');
            const resultsSection = document.getElementById('results-section');
            const inputSection = document.getElementById('input-section');
            const candidateList = document.getElementById('candidate-list');
            
            if (!jdText.trim()) {
                alert("Please enter a job description.");
                return;
            }

            // UI state: loading
            btn.disabled = true;
            loading.style.display = 'block';
            resultsSection.style.display = 'none';
            candidateList.innerHTML = '';

            try {
                // Call the local Flask API
                const response = await fetch('http://127.0.0.1:5005/api/evaluate-crisis', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ job_description: jdText })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || "Server error occurred");
                }

                // Populate JD Analysis
                document.getElementById('out-criteria').innerText = data.jd_analysis.criteria;
                document.getElementById('out-urgency').innerText = data.jd_analysis.urgency_score;

                // Populate Candidates
                data.candidate_scores.forEach((cand, index) => {
                    const card = document.createElement('div');
                    card.className = 'candidate-card';
                    card.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                            <h4 style="margin: 0;">Rank #${index + 1} (ID: ${cand.candidate_id})</h4>
                            <span class="score-badge">${cand.fit_score}% Fit</span>
                        </div>
                        <p><strong>AI Trade-off Reasoning:</strong> ${cand.tradeoff_reasoning}</p>
                    `;
                    candidateList.appendChild(card);
                });

                // UI state: show results
                inputSection.style.display = 'none';
                loading.style.display = 'none';
                resultsSection.style.display = 'block';

            } catch (error) {
                loading.style.display = 'none';
                btn.disabled = false;
                candidateList.innerHTML = `<p class="error">Error: ${error.message}</p>`;
                resultsSection.style.display = 'block';
            }
        }

        function resetTest() {
            document.getElementById('jd-input').value = '';
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('results-section').style.display = 'none';
            document.getElementById('input-section').style.display = 'block';
        }
    </script>
</body>
</html>
